<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout Hotspot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="page">
  <section class="phone-frame">
    <div class="phone-speaker"></div>
    <div class="phone-screen">
      <div class="theme-bg"></div>
      <header class="topbar">
        <div class="status-pill"><span class="dot off"></span> OFFLINE</div>
        <button id="themeToggle" class="theme-toggle" type="button">☾</button>
      </header>
      <section class="brand compact">
        <div class="logo-circle"><img src="logo.png" onerror="this.style.display='none'; this.parentElement.innerHTML='HS';" alt="Logo" /></div>
        <h1>Sampai Jumpa</h1>
      </section>
      <section class="login-card status-card">
        <h2>Logout Berhasil</h2>
        <p class="subtitle">Terima kasih sudah menggunakan layanan WiFi kami.</p>
        <a class="login-btn center" href="$(link-login)">Login Lagi</a>
      </section>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
