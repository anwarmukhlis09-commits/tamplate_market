<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Hotspot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="page">
  <section class="phone-frame">
    <div class="phone-speaker"></div>
    <div class="phone-screen">
      <div class="theme-bg"></div>
      <header class="topbar">
        <div class="status-pill"><span class="dot"></span> CONNECTED</div>
        <button id="themeToggle" class="theme-toggle" type="button">☾</button>
      </header>

      <section class="brand compact">
        <div class="logo-circle"><img src="logo.png" onerror="this.style.display='none'; this.parentElement.innerHTML='HS';" alt="Logo" /></div>
        <h1>Status Internet</h1>
      </section>

      <section class="login-card status-card">
        <h2>Anda Terhubung</h2>
        <div class="info-list">
          <div><span>Username</span><b>$(username)</b></div>
          <div><span>IP Address</span><b>$(ip)</b></div>
          <div><span>MAC Address</span><b>$(mac)</b></div>
          <div><span>Upload</span><b>$(bytes-in-nice)</b></div>
          <div><span>Download</span><b>$(bytes-out-nice)</b></div>
          <div><span>Sisa Waktu</span><b>$(session-time-left)</b></div>
        </div>
        <a class="login-btn center" href="$(link-logout)">Logout</a>
      </section>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
